    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary-white: #ffffff;
            --secondary-bg: #f8f9fa;
            --pilote-blue: #0046ad;
            --pilote-red: #e63946;
            --text-dark: #1d3557;
            --text-muted: #6c757d;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: var(--secondary-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }
        /* --- SÉCURITÉ / ACCESS GATE --- */
        
        #access-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--pilote-blue), #002d70);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: var(--transition);
        }
        
        .login-card {
            background: var(--primary-white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transform: translateY(0);
            animation: fadeIn 0.6s ease-out;
        }
        
        .login-card img {
            width: 80px;
            margin-bottom: 1rem;
        }
        
        .login-card h2 {
            margin-bottom: 1.5rem;
            color: var(--pilote-blue);
            font-weight: 700;
        }
        
        .login-card input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 1rem;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: var(--transition);
            font-size: 1rem;
        }
        
        .login-card input:focus {
            border-color: var(--pilote-blue);
        }
        
        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--pilote-red);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .login-card button:hover {
            background: #c12e3a;
            transform: translateY(-2px);
        }
        /* --- HEADER --- */
        
        header {
            background: var(--primary-white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--pilote-blue);
        }
        
        .logo span {
            color: var(--pilote-red);
        }
        
        .cart-trigger {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--pilote-blue);
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--pilote-red);
            color: white;
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
        }
        /* --- FILTRES --- */
        
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 2rem 5%;
            flex-wrap: wrap;
        }
        
        .cat-btn {
            padding: 8px 20px;
            border-radius: 25px;
            border: none;
            background: var(--primary-white);
            color: var(--pilote-blue);
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        
        .cat-btn.active,
        .cat-btn:hover {
            background: var(--pilote-blue);
            color: white;
        }
        /* --- GRILLE DE PRODUITS --- */
        
        .container {
            padding: 0 5% 5rem 5%;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .product-card {
            background: var(--primary-white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }
        
        .product-img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            border-bottom: 1px solid #eee;
        }
        
        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            text-align: center;
        }
        
        .product-id {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }
        
        .stock-status {
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .in-stock {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .out-stock {
            background: #ffebee;
            color: #c62828;
        }
        
        .add-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--pilote-blue);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .add-btn:hover {
            background: #003685;
        }
        
        .add-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        /* --- PANIER SIDEBAR --- */
        
        #cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: var(--primary-white);
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        
        #cart-sidebar.active {
            right: 0;
        }
        
        .cart-header {
            padding: 1.5rem;
            background: var(--pilote-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .cart-item-info {
            flex-grow: 1;
        }
        
        .cart-item-info h4 {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .remove-item {
            color: var(--pilote-red);
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .cart-footer {
            padding: 1.5rem;
            background: #fcfcfc;
            border-top: 1px solid #eee;
        }
        
        .whatsapp-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            margin-bottom: 1rem;
            outline: none;
        }
        
        .send-btn {
            width: 100%;
            padding: 15px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }
        /* --- OVERLAY --- */
        
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 900;
        }
        
        #overlay.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        /* RESPONSIVE */
        
        @media (max-width: 600px) {
            .cat-btn {
                padding: 6px 15px;
                font-size: 0.8rem;
            }
            .login-card {
                padding: 1.5rem;
            }
            header {
                padding: 1rem 3%;
            }
        }
    </style>
</head>

        <div class="container">

                <i class="fab fa-whatsapp"></i> Envoyer maintenant

        </div>

        // 1. VERIFICATION ACCÈS
        function verifyAccess() {
            const key = document.getElementById('access-key').value;
            const gate = document.getElementById('access-gate');
            const main = document.getElementById('main-content');
            const error = document.getElementById('error-msg');

            if (key === "solidebuilding@0000") {
                gate.style.opacity = "0";
                setTimeout(() => {
                    gate.style.display = "none";
                    main.style.opacity = "1";
                    main.style.pointerEvents = "all";
                    document.body.style.overflow = "auto";
                }, 500);
            } else {
                error.style.display = "block";
                document.getElementById('access-key').value = "";
            }
        }

        // 2. RENDU DES PRODUITS
        function displayProducts(productsToDisplay) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";

            productsToDisplay.forEach(product => {
                const card = document.createElement('div');
                card.className = "product-card";

                const stockLabel = product.stock > 0 ? `${product.stock} disponibles` : "Rupture de stock";
                const stockClass = product.stock > 0 ? "in-stock" : "out-stock";
                const isBtnDisabled = product.stock <= 0 ? "disabled" : "";

                card.innerHTML = `
                    <img src="${product.image}" alt="${product.id}" class="product-img" onerror="this.src='https://placehold.co/400x400?text=Image+Indisponible'">
                    <div class="product-info">
                        <div class="product-id">${product.id}</div>
                        <div class="stock-status ${stockClass}">
                            <i class="fas ${product.stock > 0 ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${stockLabel}
                        </div>
                        <button class="add-btn" ${isBtnDisabled} onclick="addToCart('${product.id}', '${product.image}')">
                            <i class="fas fa-plus"></i> Ajouter au panier
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. FILTRAGE
        function filterProducts(category) {
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'all') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === category);
                displayProducts(filtered);
            }
        }

        // 4. GESTION PANIER
        function addToCart(id, img) {
            cart.push({
                id,
                img
            });
            updateCartUI();
            // Animation feedback
            const cartIcon = document.querySelector('.cart-trigger');
            cartIcon.style.transform = "scale(1.3)";
            setTimeout(() => cartIcon.style.transform = "scale(1)", 200);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const count = document.getElementById('cart-count');
            const itemsContainer = document.getElementById('cart-items');

            count.innerText = cart.length;
            itemsContainer.innerHTML = "";

            if (cart.length === 0) {
                itemsContainer.innerHTML = "<p style='text-align:center; color:#888; margin-top:2rem;'>Votre panier est vide</p>";
                return;
            }

            cart.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "cart-item";
                div.innerHTML = `
                    <img src="${item.img}" alt="">
                    <div class="cart-item-info">
                        <h4>${item.id}</h4>
                    </div>
                    <i class="fas fa-trash remove-item" onclick="removeFromCart(${index})"></i>
                `;
                itemsContainer.appendChild(div);
            });
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // 5. ENVOI WHATSAPP
        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert("Votre panier est vide !");
                return;
            }

            let phone = document.getElementById('whatsapp-num').value.replace(/\s+/g, '');
            if (!phone.startsWith('+')) phone = '+' + phone;

            let message = "Bonjour , voici les differents produits disponible ! :\n\n";

            cart.forEach((item, index) => {
                message += `🔹 *Produit ${index + 1}* : ${item.id}\n`;
                message += `🔗 Image : ${BASE_IMAGE_URL}${item.img}\n\n`;
            });

            message += "Cliquer sur le lien pour voir l'image du produit !";

            const encodedMsg = encodeURIComponent(message);
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${phone}&text=${encodedMsg}`;

            window.open(whatsappUrl, '_blank');
        }

        // Init page
        window.onload = () => {
            displayProducts(products);
            document.body.style.overflow = "hidden"; // Bloque scroll au départ
        }
    </script>
</body>

</html>
